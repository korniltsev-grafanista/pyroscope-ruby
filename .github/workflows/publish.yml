name: Push ruby gems

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  push-ruby-gems:
    name: "Push ruby gems"
    runs-on: ${{ github.repository_owner == 'grafana' && 'ubuntu-x64-small' || 'ubuntu-latest' }}
    if: "startsWith(github.event.release.tag_name, 'ruby-')"
    outputs:
      files_json: ${{ steps.list-files.outputs.files_json }}
    steps:
      - name: Get secrets from Vault
        uses: grafana/shared-workflows/actions/get-vault-secrets@a2e485723e166cfec831d33751b9e5b66e2d7646 # main
        with:
          repo_secrets: |
            RUBYGEMS_API_KEY=publishing:rubygems_api_key
      - uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # 1.12
        with:
          tag: ${{ github.event.release.tag_name }}
          fileName: "*"
          tarBall: false
          zipBall: false
          out-file-path: "dist"
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0 # trufflehog:ignore
        with:
          ruby-version: '4.0.2'
      - run: |
          set -ex
          cd dist
          ls
          for gem in *.gem;
          do
            gem push "${gem}";
            sleep 5;
          done
        env:
          GEM_HOST_API_KEY: ${{ env.RUBYGEMS_API_KEY }}
